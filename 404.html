<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden – NKwork</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text x='50' y='66' font-family='serif' font-size='44' font-weight='900' fill='white' text-anchor='middle'>NK</text></svg>">
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 600;
      font-display: swap;
      src: url('./fonts/inter-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Space Grotesk';
      font-style: normal;
      font-weight: 500 700;
      font-display: swap;
      src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #09090b;
      color: #f4f4f5;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 480px; }
    .num {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #71717a;
      line-height: 1.65;
      margin-bottom: 36px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 100px;
      background: #7c3aed;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 250ms;
    }
    a:hover { background: #a855f7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Seite nicht gefunden.</h1>
    <p>Die Seite, die du suchst, existiert nicht oder wurde verschoben.</p>
    <a href="/">← Zurück zur Startseite</a>
  </div>
</body>
</html>
